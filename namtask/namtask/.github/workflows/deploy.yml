name: Nam Task — CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/namtask-api

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3-alpine
        env:
          POSTGRES_DB:       namtask_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run schema
        env:
          PGPASSWORD: test_pass
        run: |
          psql -h localhost -U test_user -d namtask_test -f scripts/schema.sql
          psql -h localhost -U test_user -d namtask_test -f scripts/schema_additions.sql
          psql -h localhost -U test_user -d namtask_test -f scripts/migrate_payments_v2.sql

      - name: Run tests
        env:
          NODE_ENV:    test
          DB_HOST:     localhost
          DB_NAME:     namtask_test
          DB_USER:     test_user
          DB_PASSWORD: test_pass
          JWT_SECRET:  test_jwt_secret_ci
        run: npm test --if-present

      - name: Check syntax (all JS files)
        run: |
          node -e "
            const fs = require('fs');
            const vm = require('vm');
            const glob = require('fs');
            const walk = (dir) => fs.readdirSync(dir).flatMap(f => {
              const p = dir+'/'+f;
              return fs.statSync(p).isDirectory() ? walk(p) : [p];
            });
            let ok=0, fail=0;
            walk('./src').filter(f=>f.endsWith('.js')).forEach(f => {
              try { new vm.Script(fs.readFileSync(f,'utf8')); ok++; }
              catch(e) { console.error('SYNTAX ERROR:', f, e.message); fail++; }
            });
            console.log(ok+' files OK,', fail+' failed');
            if (fail > 0) process.exit(1);
          "

  # ── Build & Push ──────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

  # ── Deploy to Production ──────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.namtask.com/health

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/namtask
            git pull origin main
            docker compose -f docker-compose.prod.yml pull api
            bash scripts/deploy.sh
            echo "✅ Deploy complete: $(date)"

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf https://api.namtask.com/health | python3 -c \
            "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'Health check failed: {d}'"
          echo "✅ Production is healthy"

  # ── Deploy to Staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging-api.namtask.com/health

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/namtask
            git pull origin staging
            bash scripts/deploy.sh
