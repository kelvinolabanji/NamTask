# ── Upstream ──────────────────────────────────────────────────────────────────
upstream namtask_api {
    server api:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.namtask.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (main server) ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.namtask.com;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.namtask.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.namtask.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Modern TLS config (A+ on SSL Labs)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # HSTS — tell browsers to always use HTTPS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── File upload limits ────────────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout  30s;

    # ── Connection rate limits ────────────────────────────────────────────────
    limit_conn conn_limit 20;

    # ── Static uploaded files ─────────────────────────────────────────────────
    location /uploads/ {
        alias      /app/uploads/;
        expires    7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;

        # Block directory listing
        autoindex  off;

        # Only serve image types
        location ~* \.(jpg|jpeg|png|gif|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Deny anything else (no PHP, no .env, etc.)
        location ~ \.(php|env|py|sh|sql)$ {
            deny all;
        }
    }

    # ── API docs (Swagger UI) ─────────────────────────────────────────────────
    location /api/docs {
        proxy_pass         http://namtask_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Auth endpoints (stricter rate limit) ─────────────────────────────────
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://namtask_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Webhook endpoints (no rate limit — providers need reliable delivery) ──
    location ~ ^/api/v1/payments/(fnb|bwk)/webhook {
        proxy_pass         http://namtask_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass raw body for HMAC verification
        proxy_pass_request_body on;
        proxy_set_header   Content-Length    $content_length;
        proxy_set_header   Content-Type      $content_type;
    }

    # ── Socket.io (WebSocket + long-polling) ──────────────────────────────────
    location /socket.io/ {
        proxy_pass             http://namtask_api;
        proxy_http_version     1.1;

        # Required for WebSocket upgrade
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";

        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        # Extended timeouts for persistent connections
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_connect_timeout  10s;
    }

    # ── Health check (no logging, no rate limit) ──────────────────────────────
    location = /health {
        access_log off;
        proxy_pass http://namtask_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://namtask_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    location = /favicon.ico { access_log off; log_not_found off; return 204; }
    location = /robots.txt  { access_log off; log_not_found off; return 204; }
}
