# ══════════════════════════════════════════════════════════════════════════════
# Nam Task — Production Docker Compose
#
# Services:
#   postgres   — PostGIS database (internal network only, port NOT exposed)
#   redis      — Rate limiting state, socket.io adapter (internal only)
#   api        — Node.js application (internal only)
#   nginx      — SSL termination + reverse proxy (only public-facing service)
#   certbot    — Renews Let's Encrypt certificates
# ══════════════════════════════════════════════════════════════════════════════

# ── Shared labels ─────────────────────────────────────────────────────────────
x-labels: &common-labels
  labels:
    app: namtask
    managed-by: docker-compose

# ── Logging config applied to all app containers ──────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:

  # ── PostgreSQL with PostGIS ─────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: namtask_postgres
    restart: unless-stopped
    <<: *common-labels
    logging: *default-logging
    environment:
      POSTGRES_DB: ${DB_NAME:-namtask}
      POSTGRES_USER: ${DB_USER:-namtask_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./scripts/schema_additions.sql:/docker-entrypoint-initdb.d/02_additions.sql:ro
      - ./scripts/migrate_payments_v2.sql:/docker-entrypoint-initdb.d/03_payments.sql:ro
      - ./scripts/pg-custom.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-namtask_user} -d ${DB_NAME:-namtask}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: namtask_redis
    restart: unless-stopped
    <<: *common-labels
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300m
          cpus: "0.5"

  # ── API (Node.js) ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: namtask_api
    restart: unless-stopped
    <<: *common-labels
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-namtask}
      DB_USER: ${DB_USER:-namtask_user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      COMMISSION_RATE: ${COMMISSION_RATE:-0.10}
      WITHDRAWAL_FEE: ${WITHDRAWAL_FEE:-5.00}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      API_BASE_URL: ${API_BASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      SMS_WEBHOOK_SECRET: ${SMS_WEBHOOK_SECRET}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5242880}
      FNB_API_URL: ${FNB_API_URL:-}
      FNB_CLIENT_ID: ${FNB_CLIENT_ID:-}
      FNB_CLIENT_SECRET: ${FNB_CLIENT_SECRET:-}
      FNB_WEBHOOK_SECRET: ${FNB_WEBHOOK_SECRET}
      BWK_API_URL: ${BWK_API_URL:-}
      BWK_API_KEY: ${BWK_API_KEY:-}
      BWK_API_SECRET: ${BWK_API_SECRET:-}
      BWK_WEBHOOK_SECRET: ${BWK_WEBHOOK_SECRET}
      BWK_MERCHANT_ID: ${BWK_MERCHANT_ID:-NAMTASK001}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

  # ── Nginx (SSL + reverse proxy) ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: namtask_nginx
    restart: unless-stopped
    <<: *common-labels
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/namtask.conf:/etc/nginx/conf.d/namtask.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - logs:/var/log/nginx
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

  # ── Certbot (Let's Encrypt SSL) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: namtask_certbot
    restart: "no"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
    labels:
      app: namtask
      backup: "true"
  redisdata:
    driver: local
  uploads:
    driver: local
    labels:
      app: namtask
      backup: "true"
  logs:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge