# PostgreSQL tuning for a 2GB RAM VPS
# Applied via docker-compose volume mount

# ── Connections ───────────────────────────────────────────────────────────────
max_connections = 100                  # matches pg Pool max=20 × 5 instances headroom

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers            = 256MB      # 25% of 1GB PG allocation
effective_cache_size      = 768MB      # 75% of PG allocation
work_mem                  = 4MB        # per sort/hash, 100 conn × 4MB = 400MB max
maintenance_work_mem      = 64MB       # for VACUUM, CREATE INDEX

# ── Write performance ─────────────────────────────────────────────────────────
wal_buffers               = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout        = 10min

# ── Query planning ────────────────────────────────────────────────────────────
random_page_cost          = 1.1        # SSD storage (VPS usually SSD)
effective_io_concurrency  = 200        # SSD concurrent IO

# ── Logging ───────────────────────────────────────────────────────────────────
log_min_duration_statement = 500       # log queries slower than 500ms
log_line_prefix           = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints           = on
log_connections           = on
log_disconnections        = on
log_lock_waits            = on

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum                = on
autovacuum_max_workers    = 3
autovacuum_naptime        = 1min
